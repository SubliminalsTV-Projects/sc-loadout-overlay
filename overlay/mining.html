<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mining Assistant</title>
<style>
  :root {
    --cyan: #45D0E0; --cyan-bright: #7fe3ef; --cyan-text: #c4dbe6; --cyan-dim: #7fa7bb; --faint: #5d7e90;
    --gold: #FFD27A; --amber: #F5A623; --green: #2ee6a0; --red: #ff8478;
    --divider: rgba(92, 198, 224, 0.22);
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
    --ui: Inter, "Segoe UI", system-ui, sans-serif;
    --leg: #ff9d5c; --epic: #c98bff; --rare: #5aa9ff; --unc: #4fd6a0; --common: #9fb4c0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; font-family: var(--ui); color: var(--cyan-text); overflow: hidden; }
  #panel {
    width: 340px; margin: 6px auto; padding: 0 0 8px;
    background: linear-gradient(180deg, rgba(13,27,40,.82), rgba(8,17,26,.9));
    border: 1px solid var(--divider); border-radius: 9px; backdrop-filter: blur(7px);
    box-shadow: 0 10px 34px rgba(0,0,0,.5); overflow: hidden;
  }
  .head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; -webkit-app-region: drag;
    border-bottom: 1px solid var(--divider); background: rgba(69,208,224,.05); }
  .head .diamond { width: 9px; height: 9px; background: var(--cyan); transform: rotate(45deg); box-shadow: 0 0 8px var(--cyan); }
  .head h1 { margin: 0; font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--cyan-text); flex: 1; }
  .head .x { -webkit-app-region: no-drag; cursor: pointer; color: var(--cyan-dim); font-size: 14px; padding: 2px 5px; border-radius: 3px; }
  .head .x:hover { color: var(--red); background: rgba(255,132,120,.1); }
  .setpanel { padding: 8px 12px; border-bottom: 1px solid var(--divider); background: rgba(69,208,224,.04); }
  .setrow { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 11.5px; color: var(--cyan-dim); }
  .setrow .k { min-width: 74px; }
  .setrow input[type=range] { flex: 1; accent-color: var(--gold); height: 4px; }
  .seg2 { padding: 2px 12px; border: 1px solid var(--divider); border-radius: 9px; cursor: pointer; color: var(--green); font-weight: 700; text-transform: uppercase; font-size: 9.5px; letter-spacing: .08em; }
  .seg2.off { color: var(--faint); }
  .seg2:hover { border-color: var(--cyan); }
  .lnk { cursor: pointer; color: var(--cyan-text); text-decoration: underline dotted; font-size: 11px; }
  .lnk:hover { color: var(--gold); }
  .lnk.clr { color: var(--faint); }
  .sec { padding: 8px 12px 4px; }
  .sec-h { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none;
    font-size: 9.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--cyan-dim); padding: 4px 0; }
  .sec-h .car { color: var(--cyan); font-size: 9px; transition: transform .12s; }
  .sec-h:hover { color: var(--cyan-text); }
  .sec-h .badge { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--faint); }

  /* Scanner readout */
  .scan-now { margin: 4px 0 8px; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--divider);
    background: rgba(69,208,224,.05); transition: background .2s, border-color .2s; }
  .scan-now.empty { color: var(--faint); font-size: 11.5px; text-align: center; padding: 14px 12px; }
  .scan-now .rock { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: .01em; }
  .scan-now .meta { margin-top: 3px; font-size: 11px; color: var(--cyan-dim); }
  .scan-now .sig { font-family: var(--mono); font-size: 10.5px; color: var(--faint); margin-top: 4px; }
  .scan-now.hit { animation: flashhit 1.1s ease-out; border-color: var(--gold); }
  @keyframes flashhit { 0% { background: rgba(255,210,122,.55); } 100% { background: rgba(69,208,224,.05); } }
  .rk-pill { display: inline-block; font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    padding: 1px 6px; border-radius: 8px; margin-left: 6px; vertical-align: 1px; }

  /* Target picker */
  .targets { max-height: 210px; overflow-y: auto; margin: 2px 0 6px; padding-right: 2px; }
  .targets::-webkit-scrollbar { width: 6px; } .targets::-webkit-scrollbar-thumb { background: rgba(120,210,235,.25); border-radius: 3px; }
  .rar-h { font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin: 7px 0 2px; padding-left: 2px; }
  .rk { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .rk:hover { background: rgba(69,208,224,.1); }
  .rk .box { width: 13px; height: 13px; border: 1.5px solid var(--cyan-dim); border-radius: 3px; flex: none; display: grid; place-items: center; }
  .rk.on .box { background: var(--gold); border-color: var(--gold); }
  .rk.on .box::after { content: "✓"; font-size: 10px; color: #14202b; font-weight: 800; }
  .rk.on { color: var(--gold); }
  .rk .nm { flex: 1; }

  /* Announce-mode toggle */
  .announce { display: flex; align-items: center; gap: 6px; margin: 2px 0 5px; font-size: 10px; }
  .announce .lbl { color: var(--faint); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; font-size: 8.5px; margin-right: 2px; }
  .announce .seg { padding: 2px 9px; border: 1px solid var(--divider); border-radius: 9px; cursor: pointer; color: var(--cyan-dim); }
  .announce .seg.on { background: var(--gold); border-color: var(--gold); color: #14202b; font-weight: 700; }
  .announce .seg:hover { border-color: var(--cyan); }

  /* Refinery jobs */
  .jobs { margin: 4px 0 2px; }
  .job { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 6px; border-radius: 6px;
    border: 1px solid var(--divider); background: rgba(69,208,224,.04); }
  .job.done { border-color: var(--green); background: rgba(46,230,160,.12); animation: flashdone 1.2s ease-out; }
  @keyframes flashdone { 0% { background: rgba(46,230,160,.5); } 100% { background: rgba(46,230,160,.12); } }
  .job .info { flex: 1; min-width: 0; }
  .job .mat { font-size: 13px; font-weight: 700; color: var(--cyan-text); }
  .job .sta { font-size: 10px; color: var(--cyan-dim); margin-top: 1px; }
  .job .time { font-family: var(--mono); font-size: 15px; font-variant-numeric: tabular-nums; color: var(--gold); text-align: right; }
  .job.done .time { color: var(--green); }
  .job .rm { cursor: pointer; color: var(--faint); font-size: 13px; padding: 2px 5px; border-radius: 3px; }
  .job .rm:hover { color: var(--red); background: rgba(255,132,120,.12); }
  .empty-j { color: var(--faint); font-size: 11px; text-align: center; padding: 12px 8px; }
  .foot { padding: 6px 12px 2px; font-size: 9px; color: var(--faint); text-align: center; letter-spacing: .04em; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="panel">
  <div class="head"><span class="diamond"></span><h1>Mining Assistant</h1><span class="x" id="setBtn" title="Audio settings" style="font-size:12px">⚙</span><span class="x" id="testBtn" title="Test alert sound" style="font-size:12px">🔊</span><span class="x" id="closeBtn" title="Hide (tray to reopen)">✕</span></div>
  <div id="setPanel" class="setpanel hidden">
    <div class="setrow"><span class="k">HAL voice</span><span class="seg2" id="voiceBtn">on</span></div>
    <div class="setrow"><span class="k">Volume</span><input type="range" id="volSlider" min="0" max="100" step="1"></div>
    <div class="setrow"><span class="k">Alert tone</span><span class="lnk" id="toneBtn">choose WAV…</span><span class="lnk clr hidden" id="toneClr">default</span></div>
  </div>

  <div class="sec">
    <div class="sec-h" data-sec="scan"><span class="car">▾</span>Signature Scanner<span class="badge" id="scanBadge"></span></div>
    <div id="scanBody">
      <div class="scan-now empty" id="scanNow">Scan a rock — I'll name it here.</div>
      <div class="announce"><span class="lbl">Announce</span><span class="seg" id="segTarget" data-m="target">Targets</span><span class="seg" id="segEvery" data-m="every">Every rock</span></div>
      <div class="rar-h" style="color:var(--faint)">Hunting for <span id="tgtCount"></span></div>
      <div class="targets" id="targets"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h" data-sec="ref"><span class="car">▾</span>Refinery Timers<span class="badge" id="refBadge"></span></div>
    <div id="refBody">
      <div class="jobs" id="jobs"></div>
    </div>
  </div>
  <div class="foot">Open the Refinement Center to add jobs · alarms are local</div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const RAR = { Legendary: "--leg", Epic: "--epic", Rare: "--rare", Uncommon: "--unc", Common: "--common" };
  const RAR_ORDER = ["Legendary", "Epic", "Rare", "Uncommon", "Common"];
  let view = { rocks: [], targets: [], scan: null, jobs: [] };
  const targetSet = new Set();

  // ---- audio + speech ----
  // User prefs (window-local): master volume (0–1), HAL-voice on/off. Both routed through
  // a master gain so the volume slider scales tones + clips + the alarm.
  const getVol = () => { const v = parseFloat(localStorage.getItem("miningVol")); return isNaN(v) ? 1 : Math.max(0, Math.min(1, v)); };
  const voiceOn = () => localStorage.getItem("miningVoice") !== "off";

  function speak(text) {
    if (!voiceOn()) return;
    try { const u = new SpeechSynthesisUtterance(text); u.rate = 1.02; u.volume = getVol(); speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
  }
  let actx = null, master = null;
  // A Web-Audio context created outside a user gesture starts "suspended" (silent). Create
  // it lazily and resume it here + on first interaction so alert tones always sound.
  function ensureActx() {
    try { actx = actx || new (window.AudioContext || window.webkitAudioContext)(); } catch {}
    if (actx && actx.state === "suspended") actx.resume().catch(() => {});
    return actx;
  }
  ["pointerdown", "keydown"].forEach((ev) => window.addEventListener(ev, ensureActx));
  function masterGain() {
    const ax = ensureActx(); if (!ax) return null;
    if (!master) { master = ax.createGain(); master.connect(ax.destination); }
    master.gain.value = getVol();
    return master;
  }
  function tone(freq, ms, type) {
    try {
      const dest = masterGain(); if (!dest) return;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type || "sine"; o.frequency.value = freq;
      o.connect(g); g.connect(dest);
      const t = actx.currentTime; g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + ms / 1000);
      o.start(t); o.stop(t + ms / 1000 + 0.02);
    } catch {}
  }
  // A single alert cue — a user-supplied WAV (served at /api/mining/tone) if set, else the
  // built-in synth. `dbl` plays the two-note built-in default for the mission-complete alarm.
  let toneBuf = undefined; // undefined=unloaded, null=none, AudioBuffer=custom
  async function loadTone() {
    if (toneBuf !== undefined) return toneBuf;
    const ax = ensureActx();
    try {
      const r = await fetch("api/mining/tone");
      toneBuf = r.ok ? await ax.decodeAudioData(await r.arrayBuffer()) : null;
    } catch { toneBuf = null; }
    return toneBuf;
  }
  async function cue(dbl) {
    const buf = await loadTone();
    const dest = masterGain(); if (!dest) return;
    if (buf) { const s = actx.createBufferSource(); s.buffer = buf; s.connect(dest); s.start(); return; }
    tone(880, 140, "triangle"); setTimeout(() => tone(1320, 220, "triangle"), 150);
    if (dbl) setTimeout(() => tone(1320, 220, "triangle"), 320);
  }
  const chime = () => cue(false);
  const alarm = () => cue(true);

  // HAL voice clips (concatenative). Decode each .ogg once, then schedule a sequence
  // back-to-back for gapless playback. Falls back to Windows TTS if any clip is missing
  // (a rock/station with no canned clip, or another user's build with no clips bundled).
  const clipCache = {};
  async function loadClip(slug) {
    if (slug in clipCache) return clipCache[slug];
    const ax = ensureActx();
    try {
      const buf = await fetch("tts/" + slug + ".ogg").then((r) => (r.ok ? r.arrayBuffer() : Promise.reject()));
      clipCache[slug] = await ax.decodeAudioData(buf);
    } catch { clipCache[slug] = null; }
    return clipCache[slug];
  }
  async function speakClips(slugs, fallbackText) {
    if (!voiceOn()) return;               // voice muted -> alerts are tone-only
    const dest = masterGain(); if (!dest) { speak(fallbackText); return; }
    const bufs = await Promise.all(slugs.map(loadClip));
    if (bufs.some((b) => !b)) { speak(fallbackText); return; }
    let t = actx.currentTime + 0.04;
    for (const b of bufs) { const s = actx.createBufferSource(); s.buffer = b; s.connect(dest); s.start(t); t += b.duration; }
  }
  const nameSlug = (n) => "n_" + String(n || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  const stationSlug = (s) => (s ? "st_" + String(s).toLowerCase().replace(/[^a-z0-9]/g, "") : null);
  // "Your <material> is ready at <station>" — drops the station clip if we don't have one,
  // full Windows-TTS fallback if the material clip is missing.
  async function speakRefineryDone(mat, st) {
    const matSlug = mat ? nameSlug(mat) : null;
    const fb = (mat ? mat + " " : "") + "refine ready" + (st ? " at " + st : "");
    if (!matSlug || !(await loadClip(matSlug))) { speak(fb); return; }
    const slugs = ["c_your", matSlug];
    const stSlug = stationSlug(st);
    if (stSlug && (await loadClip(stSlug))) slugs.push("c_isreadyat", stSlug);
    else slugs.push("c_isready");
    speakClips(slugs, fb);
  }

  // ---- render ----
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
  function rarPill(rar) { return '<span class="rk-pill" style="color:var(' + (RAR[rar] || "--common") + ');background:rgba(120,210,235,.12)">' + escapeHtml(rar) + '</span>'; }
  function fmtDur(sec) {
    if (sec <= 0) return "Ready";
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    return (h ? h + "h " : "") + (h || m ? (m < 10 && h ? "0" : "") + m + "m " : "") + (s < 10 ? "0" : "") + s + "s";
  }

  function renderScan() {
    const el = $("scanNow");
    const sc = view.scan;
    $("scanBadge").textContent = sc ? sc.signature.toLocaleString() : "";
    if (!sc) { el.className = "scan-now empty"; el.textContent = "Scan a rock — I'll name it here."; return; }
    el.className = "scan-now";
    const m = sc.matches;
    if (!m.length) {
      // Not in the rock table -> salvage debris.
      el.innerHTML = '<div class="rock" style="color:var(--cyan-dim)">Debris</div>' +
        '<div class="meta">Salvageable — not a mineable rock</div>' +
        '<div class="sig">signature ' + sc.signature.toLocaleString() + '</div>';
      return;
    }
    const main = m[0];
    const isTarget = m.some(x => targetSet.has(x.name));
    let html = '<div class="rock">' + escapeHtml(main.name) + rarPill(main.rarity) + '</div>' +
      '<div class="meta">' + main.count + (main.count > 1 ? " rocks" : " rock") + ' in cluster' +
      (m.length > 1 ? ' · or ' + m.slice(1).map(x => escapeHtml(x.name) + " ×" + x.count).join(", ") : '') + '</div>' +
      '<div class="sig">signature ' + sc.signature.toLocaleString() + (isTarget ? ' · TARGET' : '') + '</div>';
    el.innerHTML = html;
  }

  function renderTargets() {
    $("tgtCount").textContent = targetSet.size ? "(" + targetSet.size + ")" : "(none — tap a rock)";
    const byRar = {};
    for (const r of view.rocks) (byRar[r.rarity] = byRar[r.rarity] || []).push(r);
    let html = "";
    for (const rar of RAR_ORDER) {
      const list = byRar[rar]; if (!list) continue;
      html += '<div class="rar-h" style="color:var(' + (RAR[rar] || "--common") + ')">' + escapeHtml(rar) + '</div>';
      for (const r of list) {
        const on = targetSet.has(r.name);
        html += '<div class="rk' + (on ? " on" : "") + '" data-rock="' + escapeHtml(r.name) + '"><span class="box"></span><span class="nm">' + escapeHtml(r.name) + '</span></div>';
      }
    }
    $("targets").innerHTML = html;
  }

  function renderJobs() {
    const j = view.jobs || [];
    $("refBadge").textContent = j.length ? j.length + (j.length > 1 ? " jobs" : " job") : "";
    if (!j.length) { $("jobs").innerHTML = '<div class="empty-j">No refinery jobs tracked.<br>Open the Refinement Center and I\'ll read the timers.</div>'; return; }
    $("jobs").innerHTML = j.map(job => {
      const done = job.remainingSec <= 0;
      return '<div class="job' + (done ? " done" : "") + '" data-id="' + escapeHtml(job.id) + '">' +
        '<div class="info"><div class="mat">' + escapeHtml(job.material || "Refining") + (job.yieldScu ? ' · ' + job.yieldScu + ' cSCU' : '') + '</div>' +
        '<div class="sta">' + escapeHtml(job.station || "Refinery") + '</div></div>' +
        '<div class="time" data-end="' + job.endAt + '">' + fmtDur(job.remainingSec) + '</div>' +
        '<div class="rm" title="Remove">✕</div></div>';
    }).join("");
  }

  function renderAll() { renderScan(); renderTargets(); renderJobs(); }

  // Tick the countdowns client-side (server only pushes on change).
  setInterval(() => {
    document.querySelectorAll(".job .time[data-end]").forEach(el => {
      const rem = Math.max(0, Math.round((+el.getAttribute("data-end") - Date.now()) / 1000));
      el.textContent = fmtDur(rem);
      const job = el.closest(".job"); if (rem <= 0) job.classList.add("done");
    });
  }, 1000);

  // ---- audio settings panel ----
  $("setBtn").addEventListener("click", () => $("setPanel").classList.toggle("hidden"));
  const renderVoice = () => { const on = voiceOn(); $("voiceBtn").textContent = on ? "on" : "off"; $("voiceBtn").classList.toggle("off", !on); };
  $("voiceBtn").addEventListener("click", () => { localStorage.setItem("miningVoice", voiceOn() ? "off" : "on"); renderVoice(); });
  $("volSlider").value = Math.round(getVol() * 100);
  $("volSlider").addEventListener("input", () => { localStorage.setItem("miningVol", ($("volSlider").value / 100).toString()); if (master) master.gain.value = getVol(); });
  renderVoice();
  let cfg = {};
  async function loadCfg() {
    try { cfg = await fetch("api/config").then((r) => r.json()); } catch {}
    $("toneClr").classList.toggle("hidden", !cfg.miningTone);
  }
  $("toneBtn").addEventListener("click", async () => {
    if (!window.miningApi || !window.miningApi.pickTone) return;
    if (await window.miningApi.pickTone()) { toneBuf = undefined; cue(false); loadCfg(); }
  });
  $("toneClr").addEventListener("click", async () => {
    if (window.miningApi && window.miningApi.clearTone) await window.miningApi.clearTone();
    toneBuf = null; loadCfg();
  });
  loadCfg();
  window.addEventListener("focus", loadCfg); // pick up auto-show / tone changes from Settings

  // Auto-show: pop the window when mining/scanning is detected, unless the user just hid it.
  let autoSuppress = 0;
  function maybeAutoShow() {
    if (cfg.miningAutoShow && Date.now() > autoSuppress && window.miningApi && window.miningApi.show) window.miningApi.show();
  }

  // ---- events ----
  $("targets").addEventListener("click", (e) => {
    const rk = e.target.closest(".rk"); if (!rk) return;
    const name = rk.getAttribute("data-rock"); const on = !targetSet.has(name);
    if (on) targetSet.add(name); else targetSet.delete(name);
    rk.classList.toggle("on", on);
    $("tgtCount").textContent = targetSet.size ? "(" + targetSet.size + ")" : "(none — tap a rock)";
    fetch("/api/mining/target", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, on }) });
  });
  $("jobs").addEventListener("click", (e) => {
    if (!e.target.closest(".rm")) return;
    const id = e.target.closest(".job").getAttribute("data-id");
    fetch("/api/mining/remove-job", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id }) });
  });
  document.querySelectorAll(".sec-h").forEach(h => h.addEventListener("click", () => {
    const body = $(h.getAttribute("data-sec") === "scan" ? "scanBody" : "refBody");
    const open = body.classList.toggle("hidden");
    h.querySelector(".car").style.transform = open ? "rotate(-90deg)" : "";
  }));
  $("closeBtn").addEventListener("click", () => { autoSuppress = Date.now() + 90000; if (window.miningApi) window.miningApi.hide(); });
  $("testBtn").addEventListener("click", () => { ensureActx(); chime(); speakClips(["c_thatlookslike", "n_gold"], "Mining assistant ready"); });
  function renderSpeakMode() {
    const m = localStorage.getItem("miningSpeakMode") || "target";
    $("segTarget").classList.toggle("on", m === "target");
    $("segEvery").classList.toggle("on", m === "every");
  }
  document.querySelectorAll(".announce .seg").forEach((s) => s.addEventListener("click", () => {
    localStorage.setItem("miningSpeakMode", s.getAttribute("data-m")); renderSpeakMode();
  }));
  renderSpeakMode();

  let lastScanSig = null, lastJobCount = 0;
  function applyState(v) {
    view = v;
    targetSet.clear(); (v.targets || []).forEach(t => targetSet.add(t));
    renderAll();
    const sc = v.scan;
    if (sc && sc.signature !== lastScanSig) { lastScanSig = sc.signature; onNewScan(sc); }
    const jc = (v.jobs || []).length;
    if (jc > lastJobCount) maybeAutoShow(); // a newly-read refinery job -> pop up
    lastJobCount = jc;
  }
  // A newly-scanned rock: flash + chime + speak on a target (always), or on any rock in
  // "every" announce mode. Debris (no table match) is visual-only.
  function onNewScan(sc) {
    maybeAutoShow();                 // any new scan means the player is mining/scanning
    if (!sc.matches.length) return;
    const isTarget = sc.matches.some((m) => targetSet.has(m.name));
    if (isTarget) { const el = $("scanNow"); el.classList.remove("hit"); void el.offsetWidth; el.classList.add("hit"); chime(); }
    const mode = localStorage.getItem("miningSpeakMode") || "target";
    if (mode === "every" || isTarget) {
      speakClips(["c_thatlookslike", nameSlug(sc.matches[0].name)], "That looks like " + sc.matches[0].name);
    }
  }

  // ---- SSE ----
  function connect() {
    const es = new EventSource("/mining/events");
    es.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.kind === "state") applyState(msg.view);
      else if (msg.kind === "refinery-done") { alarm(); speakRefineryDone(msg.job.material, msg.job.station); }
      // scanner alerts (target-hit) are handled client-side in onNewScan so they respect
      // the announce-mode toggle; the server still emits target-hit but we drive off state.
    };
    es.onerror = () => { es.close(); setTimeout(connect, 2000); };
  }
  // Opening the window arms the screen reader (refinery + signature) so it starts watching.
  fetch("/api/config", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ miningAssistant: true }) }).catch(() => {});
  connect();
</script>
