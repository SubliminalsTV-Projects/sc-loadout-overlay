<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SC Blueprint Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Mission Control design language: gold (#ffb231) primary, warm dark surfaces,
     glass card + amber hero glow, Space Grotesk headlines / Inter body. */
  :root {
    --text: #e3e2e2; --muted: #d6c4ae; --outline: #9f8e7a; --outline-v: #524534;
    --surface: #1f2020; --surface-high: #292a2a;
    --gold: #ffb231; --primary: #ffd7a1; --on-gold: #6d4700; --secondary: #ffb784; --error: #ffb4ab;
    --glass-bg: rgba(24, 26, 26, 0.82); --glass-border: rgba(255, 255, 255, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: transparent; }
  body { font-family: "Inter", system-ui, sans-serif; color: var(--text); }

  #panel {
    position: relative; width: 380px; margin: 12px; border-radius: 18px; overflow: hidden;
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
  }
  /* Ambient amber glow (MC hero-gradient). */
  #panel::before { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 78% 12%, rgba(255, 178, 49, 0.10), transparent 55%); }
  #panel.empty .pool, #panel.empty .head .progress { display: none; }

  .head { position: relative; padding: 16px 18px 14px; border-bottom: 1px solid var(--glass-border);
    /* Drag handle for the Electron overlay (ignored by OBS/browser): move the window
       by the header while hovering (interactive). */
    -webkit-app-region: drag; cursor: grab; }
  #missionPick, .progress { -webkit-app-region: no-drag; }

  .eyebrow { display: flex; align-items: center; gap: 8px; font-family: "Space Grotesk", sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 8px rgba(255, 178, 49, 0.7); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  .title { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 22px; line-height: 1.05;
    letter-spacing: -0.02em; text-transform: uppercase; margin-top: 8px; color: var(--text); }
  .sub { margin-top: 4px; font-family: "Space Grotesk", sans-serif; font-size: 10px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; color: rgba(214, 196, 174, 0.55); }

  /* Custom mission dropdown (native <select> popups don't render in a transparent
     always-on-top window). */
  #missionPick { display: none; position: relative; margin-top: 10px; }
  #missionBtn { width: 100%; display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-family: "Inter", sans-serif; font-size: 13px; font-weight: 600; text-align: left;
    background: rgba(255, 178, 49, 0.08); color: var(--text);
    border: 1px solid rgba(255, 178, 49, 0.35); border-radius: 10px; padding: 7px 10px; }
  #missionBtn:hover { background: rgba(255, 178, 49, 0.16); border-color: rgba(255, 178, 49, 0.6); }
  #missionBtnLabel { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #missionBtn .caret { color: var(--gold); font-size: 12px; }
  #missionMenu { display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 20;
    background: var(--surface); border: 1px solid var(--glass-border); border-radius: 10px;
    max-height: 240px; overflow-y: auto; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.6); }
  #missionMenu.open { display: block; }
  #missionMenu .opt { padding: 8px 11px; font-size: 13px; cursor: pointer; color: var(--muted);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
  #missionMenu .opt:last-child { border-bottom: none; }
  #missionMenu .opt:hover { background: rgba(255, 178, 49, 0.12); color: var(--text); }
  #missionMenu .opt.active { color: var(--gold); font-weight: 700; }

  .progress { position: absolute; top: 16px; right: 18px; text-align: right; }
  .progress .frac { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 18px; color: var(--gold); }
  .progress .lbl { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(214, 196, 174, 0.5); }
  .completed { margin-top: 8px; display: inline-block; font-family: "Space Grotesk", sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold);
    border: 1px solid rgba(255, 178, 49, 0.5); background: rgba(255, 178, 49, 0.1); padding: 2px 9px; border-radius: 999px; }

  .pool { padding: 10px 12px 12px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 7px 9px; margin-top: 4px; border-radius: 10px;
    background: rgba(255, 255, 255, 0.025); cursor: pointer; user-select: none; transition: background .15s; }
  .row:hover { background: rgba(255, 255, 255, 0.06); }
  .row.owned { background: rgba(255, 178, 49, 0.10); }
  .mark { flex: none; width: 18px; height: 18px; display: grid; place-items: center; border-radius: 6px;
    border: 1px solid var(--outline-v); color: var(--on-gold); font-size: 12px; font-weight: 800; }
  .row.owned .mark { border-color: var(--gold); background: var(--gold); color: var(--on-gold); }
  .name { flex: 1; font-size: 14px; font-weight: 500; color: var(--muted); }
  .row.owned .name { color: var(--text); }
  .name .ovr { font-size: 10px; color: var(--secondary); margin-left: 6px; letter-spacing: 0.05em; }
  .chance { flex: none; font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 11px; color: rgba(214, 196, 174, 0.6); }

  .msg { padding: 28px 18px; text-align: center; color: var(--muted); font-size: 14px; }
  .msg b { color: var(--gold); display: block; font-family: "Space Grotesk", sans-serif;
    font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }

  .foot { padding: 10px 16px 12px; font-size: 11px; color: rgba(214, 196, 174, 0.6);
    display: flex; flex-direction: column; gap: 7px; border-top: 1px solid var(--glass-border); }
  .footrow { display: flex; justify-content: space-between; align-items: center; gap: 8px; width: 100%; }
  .foot .patch { color: rgba(214, 196, 174, 0.45); font-size: 10px; }
  #verify { font-family: "Space Grotesk", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; padding: 4px 11px; border-radius: 8px;
    border: 1px solid rgba(255, 178, 49, 0.4); color: var(--gold); background: rgba(255, 178, 49, 0.08); }
  #verify:hover { background: rgba(255, 178, 49, 0.18); }
  #verify:disabled { opacity: .6; cursor: default; }
  #vstatus { color: var(--gold); font-size: 11px; }

  /* Confirm-before-removing (prevents an accidental click un-owning a blueprint). */
  .row.confirming { background: rgba(255, 180, 171, 0.10); }
  .row .confirm { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .confirm .cf-q { font-size: 11px; color: var(--secondary); white-space: nowrap; }
  .confirm button { font-family: "Inter", sans-serif; font-size: 11px; font-weight: 700; cursor: pointer;
    padding: 3px 10px; border-radius: 7px; border: 1px solid var(--outline-v); background: rgba(255, 255, 255, 0.05); color: var(--text); }
  .confirm .cf-yes { border-color: var(--error); color: var(--error); background: rgba(255, 180, 171, 0.12); }
</style>
</head>
<body>
  <div id="panel" class="empty">
    <div class="head">
      <div class="eyebrow"><span class="dot"></span> Blueprint Pool</div>
      <div class="title" id="title">No mission tracked</div>
      <div class="sub" id="sub"></div>
      <div id="missionPick">
        <button id="missionBtn" type="button"><span id="missionBtnLabel">No mission tracked</span><span class="caret">▾</span></button>
        <div id="missionMenu"></div>
      </div>
      <div class="progress"><span class="frac" id="frac">0/0</span><div class="lbl">owned</div></div>
      <div id="completed"></div>
    </div>
    <div class="pool" id="pool"></div>
    <div id="msg"></div>
    <div class="foot">
      <div class="footrow">
        <span id="collected">collected: 0</span>
        <button id="verify" title="Re-scan your game logs (including backups) for received blueprints">⟳ Verify from logs</button>
      </div>
      <div class="footrow">
        <span id="vstatus"></span>
        <span class="patch" id="patch"></span>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  let current = null;

  function render(v) {
    current = v;
    const panel = $("panel");
    // Show the dataset version, and flag when the player's actual build isn't the one
    // we have data for (pools are an approximation from the same family).
    let patchTxt = v.patch || "";
    if (v.build && v.patch && !v.patch.includes(v.build)) patchTxt += " · build " + v.build + " (approx)";
    $("patch").textContent = patchTxt;
    $("collected").textContent = "collected: " + (v.collectedTotal ?? 0);
    $("completed").innerHTML = v.completed ? '<span class="completed">Mission complete</span>' : "";
    renderPicker(v);

    if (!v.contractKey) {
      panel.classList.add("empty");
      $("title").textContent = "No mission tracked";
      $("sub").textContent = "";
      $("pool").innerHTML = "";
      const hasList = v.missions && v.missions.length;
      $("msg").innerHTML = '<div class="msg">' +
        (hasList ? "Pick one from the dropdown above, or track a mission in-game." :
                   "Track a mission in-game to see its blueprint pool.") + "</div>";
      return;
    }
    $("title").textContent = v.title || v.contractKey;
    $("sub").textContent = (v.generator || "").replace(/_/g, " ");

    if (!v.hasPool || !v.pools.length) {
      panel.classList.add("empty");
      $("pool").innerHTML = "";
      $("msg").innerHTML = '<div class="msg"><b>No blueprint reward</b>This mission doesn’t drop blueprints.</div>';
      return;
    }
    panel.classList.remove("empty");
    $("msg").innerHTML = "";
    $("frac").textContent = v.totals.owned + "/" + v.totals.total;

    const rows = [];
    for (const pool of v.pools) {
      for (const b of pool.blueprints) {
        const ovr = b.source === "override" ? '<span class="ovr">[manual]</span>' : "";
        const ch = b.chance != null && b.chance < 1 ? '<span class="chance">' + Math.round(b.chance * 100) + "%</span>" : "";
        rows.push(
          '<div class="row ' + (b.owned ? "owned" : "") + '" data-name="' + escapeAttr(b.name) + '" title="Click to toggle owned">' +
            '<span class="mark">' + (b.owned ? "✔" : "") + "</span>" +
            '<span class="name">' + escapeHtml(b.name) + ovr + "</span>" + ch +
          "</div>"
        );
      }
    }
    $("pool").innerHTML = rows.join("");
  }

  function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
  function escapeAttr(s){return s.replace(/"/g,"&quot;");}

  // Mission picker: the log can't tell us which mission you've *selected* to track,
  // so list every accepted mission and let you choose. Auto = newest with a pool.
  function renderPicker(v) {
    const pick = $("missionPick");
    const list = v.missions || [];
    if (list.length < 1) { pick.style.display = "none"; return; }
    pick.style.display = "block";
    $("missionBtnLabel").textContent = v.selectedId
      ? (list.find((m) => m.id === v.selectedId)?.title || v.title || "Mission")
      : ("Auto: " + (v.title || "none"));
    // Disambiguate duplicate mission titles with a (1)/(2) suffix.
    const counts = {}; list.forEach((m) => (counts[m.title] = (counts[m.title] || 0) + 1));
    const seen = {};
    const rows = ['<div class="opt' + (v.selectedId ? "" : " active") + '" data-id="">Auto — newest with blueprints</div>'];
    for (const m of list) {
      let label = (m.hasPool ? "◆ " : "○ ") + m.title;
      if (counts[m.title] > 1) { seen[m.title] = (seen[m.title] || 0) + 1; label += " (" + seen[m.title] + ")"; }
      rows.push('<div class="opt' + (v.selectedId === m.id ? " active" : "") + '" data-id="' + escapeAttr(m.id) + '">' + escapeHtml(label) + "</div>");
    }
    $("missionMenu").innerHTML = rows.join("");
  }
  $("missionBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    $("missionMenu").classList.toggle("open");
  });
  $("missionMenu").addEventListener("click", (e) => {
    const opt = e.target.closest(".opt");
    if (!opt) return;
    fetch("/api/missions/select", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ missionId: opt.getAttribute("data-id") }),
    });
    $("missionMenu").classList.remove("open");
  });
  document.addEventListener("click", () => $("missionMenu").classList.remove("open"));

  function setOwned(name, owned) {
    fetch("/api/missions/own", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, owned }),
    });
  }

  // Click a blueprint to manually toggle owned (seeds pre-existing inventory).
  // Marking owned is one click; UN-marking asks first, so an accidental click while
  // looking at an item can't silently wipe a blueprint you actually own.
  $("pool").addEventListener("click", (e) => {
    const row = e.target.closest(".row");
    if (!row || !current) return;
    const name = row.getAttribute("data-name");

    if (e.target.classList.contains("cf-yes")) { setOwned(name, false); return; }
    if (e.target.classList.contains("cf-no")) {
      row.classList.remove("confirming");
      const c = row.querySelector(".confirm"); if (c) c.remove();
      return;
    }
    if (row.classList.contains("confirming")) return; // wait for a confirm choice

    if (!row.classList.contains("owned")) { setOwned(name, true); return; } // owning: no prompt

    // Un-owning: confirm first.
    row.classList.add("confirming");
    const el = document.createElement("div");
    el.className = "confirm";
    el.innerHTML = '<span class="cf-q">Mark not owned?</span>' +
      '<button class="cf-no">Keep</button><button class="cf-yes">Remove</button>';
    row.appendChild(el);
  });

  // Re-scan every game log (current + backups) for received blueprints.
  $("verify").addEventListener("click", async () => {
    const btn = $("verify");
    const label = btn.textContent;
    btn.disabled = true; btn.textContent = "Verifying…"; $("vstatus").textContent = "";
    try {
      const r = await (await fetch("/api/missions/verify", { method: "POST" })).json();
      $("vstatus").textContent = r.ok
        ? "scanned " + r.files + " live logs · +" + r.added + " new"
          + (r.restored ? " · " + r.restored + " restored" : "")
          + (r.skipped ? " · " + r.skipped + " PTU skipped" : "")
        : "verify failed";
    } catch {
      $("vstatus").textContent = "verify failed";
    } finally {
      btn.disabled = false; btn.textContent = label;
    }
  });

  // Electron overlay: report hover so the shell makes the HUD clickable only while
  // the pointer is over it (clicks pass to the game everywhere else). No-op in OBS.
  if (window.overlayApi) {
    const panel = $("panel");
    let leaveT;
    panel.addEventListener("mouseenter", () => { clearTimeout(leaveT); window.overlayApi.hover(true); });
    panel.addEventListener("mouseleave", () => { leaveT = setTimeout(() => window.overlayApi.hover(false), 150); });
  }

  // Live updates.
  const es = new EventSource("/missions/events");
  es.onmessage = (e) => { try { render(JSON.parse(e.data)); } catch {} };
  es.onerror = () => { /* auto-reconnects */ };
</script>
</body>
</html>
