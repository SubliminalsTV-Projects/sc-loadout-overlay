<script>/* AMD compatibility: apply the lite skin BEFORE first paint (no flash) when the shell asks for it. */
  if (new URLSearchParams(location.search).has("lite")) document.documentElement.classList.add("amd-lite");
  /* Apply ?theme= before first paint (no flash). The parent canvas keeps this in sync live (same-origin). */
  { const q = new URLSearchParams(location.search); const r = document.documentElement;
    const t = q.get("theme"); if (t) r.setAttribute("data-theme", t); }</script>

  * { box-sizing: border-box; }
  * { scrollbar-width: thin; scrollbar-color: rgba(var(--accent-rgb), 0.28) transparent; }
  html, body { margin: 0; height: 100%; background: transparent; }
  body { font-family: var(--sans); color: var(--cyan-text); overflow: hidden; }

  /* Standalone / browser-source: a centered fixed-size card. Embedded (?embedded=1) the widget
     shell owns the box, so the panel fills the iframe 100%. */
  #panel {
    display: flex; flex-direction: column;
    width: 320px; height: 380px; margin: 20px auto;
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    background: linear-gradient(180deg, var(--panel-top), var(--panel-bot));
    -webkit-backdrop-filter: blur(9px); backdrop-filter: blur(9px);
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(var(--accent-rgb), 0.05);
    position: relative;
  }
  html.amd-lite #panel { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; background: var(--panel-solid) !important; }
  /* Faint CRT scanlines + visor sheen, matching the HUD (decorative, non-interactive). */
  #panel::before { content: ""; position: absolute; inset: 0; border-radius: 12px; pointer-events: none; z-index: 3;
    background: repeating-linear-gradient(0deg, transparent 0 2px, var(--scan) 2px 3px); opacity: 0.5; }
  html.amd-lite #panel::before { display: none; }
  body.embedded { overflow: visible; background: transparent; }
  body.embedded #panel { width: 100%; height: 100%; margin: 0; }

  /* Header rows — one for the list, one for the editor (toggled by #panel.editing). */
  .head { flex: none; display: flex; align-items: center; gap: 8px; padding: 9px 12px;
    border-bottom: 1px solid var(--divider); position: relative; z-index: 4; min-height: 40px; }
  #panel:not(.editing) .edit-only { display: none; }
  #panel.editing .list-only { display: none; }
  #panel:not(.editing) #editView { display: none; }
  #panel.editing #listView { display: none; }
  .dia { width: 7px; height: 7px; flex: none; background: var(--cyan-bright); transform: rotate(45deg);
    box-shadow: 0 0 8px var(--cyan); }
  .h-title { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--cyan-text); flex: 1; }
  .hbtn { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--cyan-bright); background: rgba(var(--accent-rgb), 0.14); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .hbtn:hover { background: rgba(var(--accent-rgb), 0.24); border-color: var(--cyan); }
  .hbtn.ghost { background: transparent; border-color: transparent; padding-left: 2px; }
  .hbtn.ghost:hover { background: rgba(var(--accent-rgb), 0.12); }
  .hbtn.active { background: rgba(var(--accent-rgb), 0.28); border-color: var(--cyan); color: var(--cyan-bright); }
  .hbtn.danger { color: var(--red); border-color: rgba(255, 132, 120, 0.4); background: rgba(255, 132, 120, 0.08); }
  .hbtn.danger:hover { background: rgba(255, 132, 120, 0.18); border-color: var(--red); }
  .saved { flex: 1; font-family: var(--sans); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--faint); opacity: 0; transition: opacity 0.2s; text-align: right; padding-right: 8px; }
  .saved.show { opacity: 1; color: var(--green); }
  .saved.saving { opacity: 1; color: var(--faint); }

  /* Text-size stepper (list header) — scales the note CONTENT (list + editor) via zoom, leaving
     the chrome/buttons fixed, so notes stay readable from 1080p to 4K. */
  .fsz { display: flex; gap: 3px; margin-right: 2px; }
  .fsbtn { font-family: var(--sans); font-weight: 700; font-size: 11px; line-height: 1; color: var(--cyan-text);
    background: rgba(var(--accent-rgb), 0.1); border: 1px solid var(--divider); border-radius: 5px;
    width: 24px; height: 24px; cursor: pointer; padding: 0; }
  .fsbtn:hover { background: rgba(var(--accent-rgb), 0.22); border-color: var(--cyan); color: var(--cyan-bright); }
  .fsbtn:disabled { opacity: 0.4; cursor: default; }

  /* List view. Content is zoomed by --fs (text-size stepper); chrome stays fixed. */
  #listView { flex: 1; overflow-y: auto; overflow-x: hidden; zoom: var(--fs, 1); }
  .note-item { display: block; width: 100%; text-align: left; cursor: pointer;
    padding: 10px 12px; border: 0; border-bottom: 1px solid rgba(var(--accent-rgb), 0.08);
    background: transparent; color: var(--cyan-text); font-family: var(--sans); }
  .note-item:hover { background: rgba(var(--accent-rgb), 0.09); }
  .note-item .ni-title { font-size: 12.5px; font-weight: 600; color: var(--cyan-bright);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item .ni-title.untitled { color: var(--faint); font-style: italic; font-weight: 500; }
  .note-item .ni-prev { font-size: 11px; color: var(--cyan-dim); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item .ni-time { font-size: 9.5px; color: var(--faint); margin-top: 3px; letter-spacing: 0.04em;
    font-family: var(--mono); }
  .empty { padding: 28px 16px; text-align: center; color: var(--faint); font-size: 12px; line-height: 1.7; }

  /* Editor view. */
  #editView { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 10px 12px 12px; zoom: var(--fs, 1); }
  #noteTitle { flex: none; font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--cyan-bright);
    background: transparent; border: 0; border-bottom: 1px solid var(--divider); padding: 4px 2px 8px;
    outline: none; }
  #noteTitle::placeholder { color: var(--faint); font-weight: 500; }
  #noteBody { flex: 1; min-height: 0; margin-top: 10px; resize: none; font-family: var(--sans); font-size: 12.5px;
    line-height: 1.6; color: var(--cyan-text); background: transparent; border: 0; outline: none; }
  #noteBody::placeholder { color: var(--faint); }
</style>
</head>
<body>
  <div id="panel">
    <div class="head list-only">
      <span class="dia"></span>
      <span class="h-title">Notepad</span>
      <div class="fsz">
        <button id="fsDown" class="fsbtn" type="button" title="Smaller text">A−</button>
        <button id="fsUp" class="fsbtn" type="button" title="Larger text">A+</button>
      </div>
      <button id="newBtn" class="hbtn" type="button">＋ New</button>
    </div>
    <div class="head edit-only">
      <button id="backBtn" class="hbtn ghost" type="button">‹ Notes</button>
      <button id="typeBtn" class="hbtn" type="button" title="Typing mode: grab keyboard focus + free up the interact key so you can type in-game">✎ Type</button>
      <span id="savedTag" class="saved">Saved ✓</span>
      <button id="delBtn" class="hbtn danger" type="button" title="Delete this note">🗑</button>
    </div>

    <div id="listView">
      <div id="noteList"></div>
      <div id="emptyState" class="empty">No notes yet.<br>Tap <b>＋ New</b> to start one.</div>
    </div>

    <div id="editView">
      <input id="noteTitle" type="text" placeholder="Title" maxlength="200" spellcheck="false" />
      <textarea id="noteBody" placeholder="Write your note…" maxlength="20000" spellcheck="false"></textarea>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const EMBEDDED = new URLSearchParams(location.search).has("embedded");
  if (EMBEDDED) document.body.classList.add("embedded");
  // Same-origin bridge to the parent canvas (present only when embedded on the overlay).
  const host = () => (EMBEDDED && window.parent) ? window.parent.__notepadHost : null;

  let notes = [];        // [{ id, title, body, createdAt, updatedAt }]
  let editingId = null;  // id of the note open in the editor, or null (list view)
  let saveTimer = null;

  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2, 8));
  const byNewest = (a, b) => (b.updatedAt || 0) - (a.updatedAt || 0);
  const cur = () => notes.find((n) => n.id === editingId) || null;

  function fmtWhen(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    if (isNaN(d.getTime())) return "";
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    if (sameDay) return time;
    return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " · " + time;
  }

  // ── persistence ─────────────────────────────────────────────────────────────
  async function loadNotes() {
    try {
      const r = await fetch("/api/notes", { cache: "no-store" });
      const data = await r.json();
      notes = Array.isArray(data.notes) ? data.notes : [];
    } catch { notes = []; }
    renderList();
  }
  async function saveNow() {
    setSaved("saving");
    try {
      await fetch("/api/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notes }),
      });
      setSaved("saved");
    } catch { setSaved(""); }
  }
  function scheduleSave() {
    setSaved("saving");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 500);
  }
  function setSaved(state) {
    const t = $("savedTag");
    t.classList.toggle("saving", state === "saving");
    t.classList.toggle("show", state === "saved");
    t.textContent = state === "saving" ? "Saving…" : "Saved ✓";
    if (state === "saved") { clearTimeout(setSaved._t); setSaved._t = setTimeout(() => t.classList.remove("show"), 1500); }
  }

  // ── list view ────────────────────────────────────────────────────────────────
  function renderList() {
    const list = $("noteList");
    list.textContent = "";
    const sorted = notes.slice().sort(byNewest);
    $("emptyState").style.display = sorted.length ? "none" : "block";
    for (const n of sorted) {
      const item = document.createElement("button");
      item.type = "button";
      item.className = "note-item";
      const title = document.createElement("div");
      title.className = "ni-title" + (n.title.trim() ? "" : " untitled");
      title.textContent = n.title.trim() || "Untitled note";
      const prev = document.createElement("div");
      prev.className = "ni-prev";
      prev.textContent = n.body.trim().replace(/\s+/g, " ") || "No content";
      const time = document.createElement("div");
      time.className = "ni-time";
      time.textContent = fmtWhen(n.updatedAt);
      item.append(title, prev, time);
      item.addEventListener("click", () => openNote(n.id));
      list.appendChild(item);
    }
  }

  // ── editor view ───────────────────────────────────────────────────────────────
  function openNote(id) {
    editingId = id;
    const n = cur();
    if (!n) return;
    $("noteTitle").value = n.title;
    $("noteBody").value = n.body;
    $("panel").classList.add("editing");
    $("savedTag").classList.remove("show", "saving");
    setTyping(false); // open in read mode; the "Type" button grabs focus when the user wants to write
  }
  function newNote() {
    const now = Date.now();
    const n = { id: newId(), title: "", body: "", createdAt: now, updatedAt: now };
    notes.push(n);
    openNote(n.id);
  }
  function backToList() {
    if (typing) setTyping(false); // release the overlay's keyboard grab
    const n = cur();
    // Drop a note left completely empty so the list doesn't fill with blanks.
    if (n && !n.title.trim() && !n.body.trim()) {
      notes = notes.filter((x) => x.id !== n.id);
      saveNow();
    }
    editingId = null;
    $("panel").classList.remove("editing");
    renderList();
  }
  function deleteNote() {
    if (!editingId) return;
    if (typing) setTyping(false);
    notes = notes.filter((n) => n.id !== editingId);
    editingId = null;
    $("panel").classList.remove("editing");
    renderList();
    saveNow();
  }
  // Typing mode: the overlay grabs keyboard focus + suspends the interact key so you can type
  // in-game without alt-tabbing (and so the interact key, e.g. F, types as a letter). The note
  // field is focused by the parent via __notepadFocus once the interact key is released (no stray
  // characters). Standalone (no overlay host) just focuses the field directly.
  let typing = false;
  function setTyping(on) {
    typing = !!on;
    const b = $("typeBtn");
    b.textContent = typing ? "✓ Done" : "✎ Type";
    b.classList.toggle("active", typing);
    if (typing) {
      if (host()) host().editStart(); // parent grabs focus + suspends interact, then calls __notepadFocus
      else $("noteBody").focus();     // standalone / already-focused window
    } else {
      if (host()) host().editEnd();
      const a = document.activeElement; if (a && a.blur) a.blur();
    }
  }
  // Called by the overlay parent once it's safe to focus (the held interact key has been released).
  window.__notepadFocus = () => { if (typing) $("noteBody").focus(); };
  // Called by the parent when the widget is hidden — leave typing mode so its state can't linger.
  window.__notepadExitTyping = () => { if (typing) setTyping(false); };
  function onEdit() {
    const n = cur();
    if (!n) return;
    n.title = $("noteTitle").value;
    n.body = $("noteBody").value;
    n.updatedAt = Date.now();
    scheduleSave();
  }

  $("newBtn").addEventListener("click", newNote);
  $("backBtn").addEventListener("click", backToList);
  $("delBtn").addEventListener("click", deleteNote);
  $("typeBtn").addEventListener("click", () => setTyping(!typing));
  $("noteTitle").addEventListener("input", onEdit);
  $("noteBody").addEventListener("input", onEdit);
  // Esc leaves typing mode (releases the overlay's keyboard grab, back to click-through).
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && typing) { e.preventDefault(); setTyping(false); } });

  // Any interaction summons the parent's global cog (settings/arrange reachable), matching mining.
  document.addEventListener("pointerdown", () => { try { host()?.summonCog?.(); } catch { /* not embedded */ } });

  // ── Text size ─────────────────────────────────────────────────────────────────
  // Scales the note CONTENT (list + editor) via the --fs zoom var so notes stay readable from
  // 1080p to 4K; the chrome/buttons stay a fixed size. Persisted in config (survives restarts).
  let fontScale = 1;
  let fsSaveTimer = null;
  function applyFontScale() {
    $("panel").style.setProperty("--fs", fontScale);
    $("fsDown").disabled = fontScale <= 0.8001;
    $("fsUp").disabled = fontScale >= 1.9999;
  }
  function bumpFontScale(delta) {
    fontScale = Math.max(0.8, Math.min(2, Math.round((fontScale + delta) * 10) / 10));
    applyFontScale();
    clearTimeout(fsSaveTimer);
    fsSaveTimer = setTimeout(() => {
      fetch("/api/config", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ notepadFontScale: fontScale }) }).catch(() => { /* best-effort */ });
    }, 400);
  }
  async function loadFontScale() {
    try {
      const c = await (await fetch("/api/config", { cache: "no-store" })).json();
      if (typeof c.notepadFontScale === "number" && isFinite(c.notepadFontScale)) fontScale = Math.max(0.8, Math.min(2, c.notepadFontScale));
    } catch { /* keep default */ }
    applyFontScale();
  }
  $("fsDown").addEventListener("click", () => bumpFontScale(-0.1));
  $("fsUp").addEventListener("click", () => bumpFontScale(0.1));

  loadNotes();
  loadFontScale();
  try { host()?.ready?.(); } catch { /* not embedded */ }
</script>
</body>
</html>
